# Agent Identity System
# Keycloak (humans) + SurrealDB (agents) + OpenFGA (relationships) + OPA (policies)

services:
  surrealdb:
    image: surrealdb/surrealdb:v2.3.6
    container_name: agentid-surrealdb
    restart: always
    command: ["start", "--log=warn", "--user=${SURREAL_USER}", "--pass=${SURREAL_PASS}", "rocksdb:/data/agents.db"]
    volumes:
      - surrealdb-data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--conn", "http://localhost:8000"]
      interval: 15s
      timeout: 5s

  openfga:
    image: openfga/openfga:v1.8.0
    container_name: agentid-openfga
    restart: always
    command: run
    environment:
      - OPENFGA_DATASTORE_ENGINE=memory
      - OPENFGA_AUTHN_METHOD=preshared
      - OPENFGA_AUTHN_PRESHARED_KEYS=${OPENFGA_PRESHARED_KEY}
    ports: ["127.0.0.1:8080:8080"]

  opa:
    image: openpolicyagent/opa:0.70.0-static
    container_name: agentid-opa
    restart: always
    command: ["run", "--server", "--addr=0.0.0.0:8181", "--log-format=json", "--log-level=error", "/policies"]
    volumes:
      - ./opa:/policies:ro

  api:
    build: .
    container_name: agentid-api
    restart: always
    ports: ["127.0.0.1:8500:8500"]
    depends_on:
      surrealdb: { condition: service_healthy }
    env_file: .env
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8500"]

volumes:
  surrealdb-data:
